<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAO Smart AI - Chat Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .robot-icon {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .header-info h1 {
            font-size: 22px;
            margin-bottom: 5px;
        }

        .header-info p {
            font-size: 13px;
            opacity: 0.9;
        }

        .status-indicator {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        .status-dot.disconnected {
            background: #f87171;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .config-panel {
            padding: 15px 20px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }

        .config-input {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .config-input label {
            font-size: 14px;
            font-weight: 600;
            color: #475569;
        }

        .config-input input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f1f5f9;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
        }

        .action-content {
            background: #fff7ed !important;
            color: #c2410c !important;
            border: 2px solid #fdba74;
            border-bottom-left-radius: 4px;
            font-family: 'Courier New', monospace;
            box-shadow: 0 4px 12px rgba(251, 146, 60, 0.2);
            position: relative;
        }

        .action-badge-icon {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #c2410c;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-content {
            background: white;
            color: #1e293b;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .message-timestamp {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 5px;
            text-align: right;
        }

        .movements-tag {
            display: inline-block;
            background: #e0e7ff;
            color: #4338ca;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            margin: 4px 4px 0 0;
            font-weight: 500;
        }

        .movements-container {
            margin-top: 8px;
        }

        .loading {
            display: flex;
            gap: 6px;
            padding: 12px 16px;
        }

        .loading-dot {
            width: 8px;
            height: 8px;
            background: #94a3b8;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .loading-dot:nth-child(1) { animation-delay: -0.32s; }
        .loading-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #messageInput {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        #messageInput:focus {
            border-color: #667eea;
        }

        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-send {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-clear {
            background: #ef4444;
            color: white;
        }

        .btn-clear:hover {
            background: #dc2626;
        }

        .error-message {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 12px;
            margin: 10px 20px;
            border-left: 4px solid #dc2626;
            font-size: 14px;
        }

        .chat-id-display {
            font-size: 11px;
            color: #64748b;
            padding: 8px 20px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="robot-icon">🤖</div>
            <div class="header-info">
                <h1>NAO Smart AI</h1>
                <p>Robot Sociale Umanoide - IISS Colamonico Chiarulli</p>
            </div>
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Connesso</span>
            </div>
        </div>

        <div class="config-panel">
            <div class="config-input">
                <label>API URL:</label>
                <input type="text" id="apiUrl" placeholder="http://127.0.0.1:5000/chat" value="http://127.0.0.1:5000/chat">
            </div>
        </div>

        <div class="chat-id-display" id="chatIdDisplay" style="display: none;">
            Chat ID: <span id="chatIdValue"></span>
        </div>

        <div class="messages-container" id="messagesContainer"></div>

        <div class="input-container">
            <div class="input-wrapper">
                <input
                    type="text"
                    id="messageInput"
                    placeholder="Scrivi un messaggio a NAO..."
                    autocomplete="off"
                >
                <button class="btn btn-send" id="sendBtn">
                    <span>📤</span> Invia
                </button>
                <button class="btn btn-clear" id="clearBtn">
                    🗑️ Pulisci
                </button>
            </div>
        </div>
    </div>

    <script>
        let chatId = null;
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');
        const apiUrlInput = document.getElementById('apiUrl');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const chatIdDisplay = document.getElementById('chatIdDisplay');
        const chatIdValue = document.getElementById('chatIdValue');

        // Mappa delle emoticon AGGIORNATA basata sui movimenti reali disponibili
        const movementEmojis = {
            // BodyTalk
            'BodyTalk/Speaking': '💬',
            'BodyTalk/Thinking/Remember': '💭',
            
            // Emotions/Negative
            'Emotions/Negative/Angry': '😠',
            'Emotions/Negative/Anxious': '😰',
            'Emotions/Negative/Bored': '😑',
            'Emotions/Negative/Disappointed': '😞',
            'Emotions/Negative/Exhausted': '😫',
            'Emotions/Negative/Fear': '😨',
            'Emotions/Negative/Fearful': '😱',
            'Emotions/Negative/Frustrated': '😤',
            'Emotions/Negative/Humiliated': '😳',
            'Emotions/Negative/Hurt': '😢',
            'Emotions/Negative/Late': '⏰',
            'Emotions/Negative/Sad': '😢',
            'Emotions/Negative/Shocked': '😲',
            'Emotions/Negative/Sorry': '🙏',
            'Emotions/Negative/Surprise': '😮',
            
            // Emotions/Neutral
            'Emotions/Neutral/Alienated': '🤷',
            'Emotions/Neutral/Annoyed': '😒',
            'Emotions/Neutral/AskForAttention': '👋',
            'Emotions/Neutral/Cautious': '🤨',
            'Emotions/Neutral/Confused': '😕',
            'Emotions/Neutral/Determined': '😤',
            'Emotions/Neutral/Embarrassed': '😅',
            'Emotions/Neutral/Hello': '👋',
            'Emotions/Neutral/Hesitation': '😬',
            'Emotions/Neutral/Innocent': '😇',
            'Emotions/Neutral/Lonely': '😔',
            'Emotions/Neutral/Mischievous': '😏',
            'Emotions/Neutral/Puzzled': '🤔',
            'Emotions/Neutral/Sneeze': '🤧',
            'Emotions/Neutral/Stubborn': '😠',
            'Emotions/Neutral/Suspicious': '🤨',
            
            // Emotions/Positive
            'Emotions/Positive/Amused': '😄',
            'Emotions/Positive/Confident': '😎',
            'Emotions/Positive/Ecstatic': '🤩',
            'Emotions/Positive/Enthusiastic': '🤗',
            'Emotions/Positive/Excited': '😃',
            'Emotions/Positive/Happy': '😊',
            'Emotions/Positive/Hungry': '🍕',
            'Emotions/Positive/Hysterical': '😂',
            'Emotions/Positive/Interested': '🧐',
            'Emotions/Positive/Laugh': '😄',
            'Emotions/Positive/Mocker': '😏',
            'Emotions/Positive/Optimistic': '😊',
            'Emotions/Positive/Peaceful': '😌',
            'Emotions/Positive/Proud': '😌',
            'Emotions/Positive/Relieved': '😅',
            'Emotions/Positive/Shy': '😊',
            'Emotions/Positive/Sure': '👍',
            'Emotions/Positive/Winner': '🏆',
            
            // Gestures
            'Gestures/Applause': '👏',
            'Gestures/BowShort': '🙇',
            'Gestures/But': '☝️',
            'Gestures/CalmDown': '🤚',
            'Gestures/Caress': '🤗',
            'Gestures/CatchFly': '🦟',
            'Gestures/Choice': '🤷',
            'Gestures/Claw': '✊',
            'Gestures/Coaxing': '🤝',
            'Gestures/ComeOn': '👍',
            'Gestures/CountFive': '5️⃣',
            'Gestures/CountFour': '4️⃣',
            'Gestures/CountMore': '🔢',
            'Gestures/CountOne': '1️⃣',
            'Gestures/CountThree': '3️⃣',
            'Gestures/CountTwo': '2️⃣',
            'Gestures/Desperate': '😩',
            'Gestures/Enthusiastic': '🙌',
            'Gestures/Everything': '🌍',
            'Gestures/Explain': '👨‍🏫',
            'Gestures/Far': '👉',
            'Gestures/Follow': '🚶',
            'Gestures/Freeze': '🧊',
            'Gestures/Give': '🎁',
            'Gestures/Great': '👍',
            'Gestures/HeSays': '💬',
            'Gestures/Hey': '👋',
            'Gestures/Hide': '🙈',
            'Gestures/Hungry': '🍕',
            'Gestures/IDontKnow': '🤷',
            'Gestures/JointHands': '🙏',
            'Gestures/Joy': '😄',
            'Gestures/Kisses': '😘',
            'Gestures/Look': '👀',
            'Gestures/Maybe': '🤔',
            'Gestures/Me': '👤',
            'Gestures/Mime': '🎭',
            'Gestures/Next': '➡️',
            'Gestures/No': '❌',
            'Gestures/Nothing': '🚫',
            'Gestures/OnTheEvening': '🌙',
            'Gestures/Please': '🙏',
            'Gestures/Reject': '🙅',
            'Gestures/Salute': '👋',
            'Gestures/Shoot': '🎯',
            'Gestures/ShowFloor': '⬇️',
            'Gestures/ShowSky': '⬆️',
            'Gestures/Shy': '😊',
            'Gestures/Stretch': '🤸',
            'Gestures/Surprised': '😮',
            'Gestures/Take': '🤲',
            'Gestures/Thinking': '🤔',
            'Gestures/This': '👈',
            'Gestures/WhatSThis': '❓',
            'Gestures/Wings': '🦅',
            'Gestures/Yes': '✅',
            'Gestures/You': '👉',
            'Gestures/YouKnowWhat': '💡',
            'Gestures/Yum': '😋'
        };

        function getEmojiForMovement(movement) {
            // Cerca corrispondenza esatta o parziale
            for (const [key, emoji] of Object.entries(movementEmojis)) {
                if (movement.includes(key)) {
                    return emoji;
                }
            }
            return '🤖';
        }

        function updateStatus(connected) {
            if (connected) {
                statusDot.classList.remove('disconnected');
                statusText.textContent = 'Connesso';
            } else {
                statusDot.classList.add('disconnected');
                statusText.textContent = 'Disconnesso';
            }
        }

        function updateChatId(id) {
            if (id) {
                chatId = id;
                chatIdValue.textContent = id;
                chatIdDisplay.style.display = 'block';
            }
        }

        function addMessage(text, isUser, movements = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;

            if (movements && movements.length > 0) {
                const movementsDiv = document.createElement('div');
                movementsDiv.className = 'movements-container';
                movements.forEach(mov => {
                    const tag = document.createElement('span');
                    tag.className = 'movements-tag';
                    const emoji = getEmojiForMovement(mov);
                    const cleanName = mov.replace('animations/Stand/', '');
                    tag.textContent = `${emoji} ${cleanName}`;
                    movementsDiv.appendChild(tag);
                });
                contentDiv.appendChild(movementsDiv);
            }

            const timestamp = document.createElement('div');
            timestamp.className = 'message-timestamp';
            timestamp.textContent = new Date().toLocaleTimeString('it-IT', {
                hour: '2-digit',
                minute: '2-digit'
            });
            contentDiv.appendChild(timestamp);

            messageDiv.appendChild(contentDiv);
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function addActionMessage(actionText) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content action-content';

            const badge = document.createElement('div');
            badge.className = 'action-badge-icon';
            badge.textContent = '🎬';
            contentDiv.appendChild(badge);

            contentDiv.innerHTML += `<strong>AZIONE RILEVATA:</strong><br>${actionText}`;

            const timestamp = document.createElement('div');
            timestamp.className = 'message-timestamp';
            timestamp.textContent = new Date().toLocaleTimeString('it-IT', {
                hour: '2-digit',
                minute: '2-digit'
            });
            contentDiv.appendChild(timestamp);

            messageDiv.appendChild(contentDiv);
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function addLoadingIndicator() {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message bot';
            loadingDiv.id = 'loadingIndicator';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content loading';

            for (let i = 0; i < 3; i++) {
                const dot = document.createElement('div');
                dot.className = 'loading-dot';
                contentDiv.appendChild(dot);
            }

            loadingDiv.appendChild(contentDiv);
            messagesContainer.appendChild(loadingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function removeLoadingIndicator() {
            const loading = document.getElementById('loadingIndicator');
            if (loading) {
                loading.remove();
            }
        }

        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = `❌ Errore: ${message}`;
            messagesContainer.appendChild(errorDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            setTimeout(() => errorDiv.remove(), 5000);
            updateStatus(false);
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            const apiUrl = apiUrlInput.value.trim();
            if (!apiUrl) {
                showError('Inserisci un URL API valido');
                return;
            }

            addMessage(message, true);
            messageInput.value = '';
            sendBtn.disabled = true;
            addLoadingIndicator();

            const payload = {
                action: 'talk',
                message: message
            };

            if (chatId) {
                payload.chat_id = chatId;
            }

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                removeLoadingIndicator();

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                if (data.success) {
                    updateStatus(true);
                    updateChatId(data.chat_id);

                    if (data.response) {
                        if (data.response.chunks) {
                            data.response.chunks.forEach(chunk => {
                                addMessage(chunk.text, false, chunk.movements);
                            });
                        }

                        if (data.response.action && data.response.action !== "NO_ACTION") {
                            addActionMessage(data.response.action);
                        }
                    }
                } else {
                    showError(data.error || 'Risposta non valida dal server');
                }
            } catch (error) {
                removeLoadingIndicator();
                showError(error.message);
            } finally {
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        async function endChat() {
            if (!chatId) {
                messagesContainer.innerHTML = '';
                chatIdDisplay.style.display = 'none';
                return;
            }

            const apiUrl = apiUrlInput.value.trim();

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        action: 'end',
                        chat_id: chatId
                    })
                });

                if (response.ok) {
                    chatId = null;
                    messagesContainer.innerHTML = '';
                    chatIdDisplay.style.display = 'none';
                    addMessage('Chat terminata. Puoi iniziare una nuova conversazione.', false);
                }
            } catch (error) {
                showError('Errore nella chiusura della chat: ' + error.message);
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        clearBtn.addEventListener('click', endChat);

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) {
                sendMessage();
            }
        });

        addMessage('Ciao! Sono NAO, il robot sociale della scuola Colamonico Chiarulli. Come posso aiutarti oggi?', false);
    </script>
</body>
</html>
