<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAO Smart AI - Chat Interface</title>
    <link rel="stylesheet" href="./shared_chat.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .robot-icon {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .header-info h1 {
            font-size: 22px;
            margin-bottom: 5px;
        }

        .header-info p {
            font-size: 13px;
            opacity: 0.9;
        }

        .status-indicator {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        .status-dot.disconnected {
            background: #f87171;
            animation: none;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .config-panel {
            padding: 15px 20px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }

        .config-input {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .config-input label {
            font-size: 14px;
            font-weight: 600;
            color: #475569;
        }

        .config-input input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
        }



        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #messageInput {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        #messageInput:focus {
            border-color: #667eea;
        }

        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-send {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-clear {
            background: #ef4444;
            color: white;
        }

        .btn-clear:hover {
            background: #dc2626;
        }

        .error-message {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 12px;
            margin: 10px 20px;
            border-left: 4px solid #dc2626;
            font-size: 14px;
        }

        .chat-id-display {
            font-size: 11px;
            color: #64748b;
            padding: 8px 20px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="robot-icon">🤖</div>
            <div class="header-info">
                <h1>NAO Smart AI</h1>
                <p>Robot Sociale Umanoide - IISS Colamonico Chiarulli</p>
            </div>
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Connesso</span>
            </div>
        </div>

        <div class="config-panel">
            <div class="config-input">
                <label>API URL:</label>
                <input type="text" id="apiUrl" placeholder="http://127.0.0.1:5000/chat"
                    value="http://127.0.0.1:5000/chat">
            </div>
        </div>

        <div class="chat-id-display" id="chatIdDisplay" style="display: none;">
            Chat ID: <span id="chatIdValue"></span>
        </div>

        <div class="messages-container" id="messagesContainer"></div>

        <div class="input-container">
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="Scrivi un messaggio a NAO..." autocomplete="off">
                <button class="btn btn-send" id="sendBtn">
                    <span>📤</span> Invia
                </button>
                <button class="btn btn-clear" id="clearBtn">
                    🗑️ Pulisci
                </button>
            </div>
        </div>
    </div>

    <script src="./shared_chat.js"></script>
    <script>
        let chatId = null;
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');
        const apiUrlInput = document.getElementById('apiUrl');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const chatIdDisplay = document.getElementById('chatIdDisplay');
        const chatIdValue = document.getElementById('chatIdValue');



        function updateStatus(connected) {
            if (connected) {
                statusDot.classList.remove('disconnected');
                statusText.textContent = 'Connesso';
            } else {
                statusDot.classList.add('disconnected');
                statusText.textContent = 'Disconnesso';
            }
        }

        function updateChatId(id) {
            if (id) {
                chatId = id;
                chatIdValue.textContent = id;
                chatIdDisplay.style.display = 'block';
            }
        }

        function addMessage(text, isUser, movements = null) {
            const dom = SharedChatLogic.createMessageDOM(text, isUser, movements);
            messagesContainer.appendChild(dom);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function addActionMessage(actionText) {
            const dom = SharedChatLogic.createActionDOM(actionText);
            messagesContainer.appendChild(dom);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function addLoadingIndicator() {
            const dom = SharedChatLogic.createLoadingDOM();
            messagesContainer.appendChild(dom);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function removeLoadingIndicator() {
            const loading = document.getElementById('loadingIndicator');
            if (loading) {
                loading.remove();
            }
        }

        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = `❌ Errore: ${message}`;
            messagesContainer.appendChild(errorDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            setTimeout(() => errorDiv.remove(), 5000);
            updateStatus(false);
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            const apiUrl = apiUrlInput.value.trim();
            if (!apiUrl) {
                showError('Inserisci un URL API valido');
                return;
            }

            addMessage(message, true);
            messageInput.value = '';
            sendBtn.disabled = true;
            addLoadingIndicator();

            const payload = {
                action: 'talk',
                message: message
            };

            if (chatId) {
                payload.chat_id = chatId;
            }

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                removeLoadingIndicator();

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                if (data.success) {
                    updateStatus(true);
                    updateChatId(data.chat_id);

                    if (data.response) {
                        if (data.response.chunks) {
                            data.response.chunks.forEach(chunk => {
                                addMessage(chunk.text, false, chunk.movements);
                            });
                        }

                        if (data.response.action && data.response.action !== "NO_ACTION") {
                            addActionMessage(data.response.action);
                        }
                    }
                } else {
                    showError(data.error || 'Risposta non valida dal server');
                }
            } catch (error) {
                removeLoadingIndicator();
                showError(error.message);
            } finally {
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        async function endChat() {
            if (!chatId) {
                messagesContainer.innerHTML = '';
                chatIdDisplay.style.display = 'none';
                return;
            }

            const apiUrl = apiUrlInput.value.trim();

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        action: 'end',
                        chat_id: chatId
                    })
                });

                if (response.ok) {
                    chatId = null;
                    messagesContainer.innerHTML = '';
                    chatIdDisplay.style.display = 'none';
                    addMessage('Chat terminata. Puoi iniziare una nuova conversazione.', false);
                }
            } catch (error) {
                showError('Errore nella chiusura della chat: ' + error.message);
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        clearBtn.addEventListener('click', endChat);

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) {
                sendMessage();
            }
        });

        addMessage('Ciao! Sono NAO, il robot sociale della scuola Colamonico Chiarulli. Come posso aiutarti oggi?', false);
    </script>
</body>

</html>
